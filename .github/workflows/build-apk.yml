name: Build Android APK

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - build-apk
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BUILD_ID: ${{ github.run_number }}
      APP_NAME: Web2App AI
      PACKAGE_NAME: com.kul236.webapp
      WEBSITE_URL: https://web2appconversion.netlify.app/
      ICON_COLOR: "#6366f1"

    steps:
      # ── 1. Notify: Building ──────────────────────────────────────────────
      - name: Notify build started
        if: ${{ github.event.client_payload.callback_url != '' && github.event.client_payload.callback_url != null }}
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ github.event.client_payload.callback_secret }}" \
            -d '{
              "build_id": "${{ github.run_number }}",
              "status": "building",
              "github_run_id": "${{ github.run_id }}"
            }' || true

      # ── 2. Checkout android template ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Set up Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Cache Gradle ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Set Build Variables ──────────────────────────────────────────
      - name: Set Build Variables
        run: |
          echo "Build ID: ${{ env.BUILD_ID }}"
          echo "App Name: ${{ env.APP_NAME }}"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "Website: ${{ env.WEBSITE_URL }}"

      # ── 6. Replace placeholders ─────────────────────────────────────────
      - name: Configure app placeholders
        working-directory: android-template
        env:
          APP_NAME: Web2App AI
          PACKAGE_NAME: com.kul236.webapp
          WEBSITE_URL: https://web2appconversion.netlify.app/
          ICON_COLOR: "#6366f1"
        run: |
          # Sanitize inputs
          SAFE_APP_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9 _-]//g')
          SAFE_PACKAGE=$(echo "$PACKAGE_NAME" | sed 's/[^a-z0-9._]//g')
          SAFE_URL=$(echo "$WEBSITE_URL" | sed 's|[^a-zA-Z0-9.:/_?=&-]||g')
          SAFE_COLOR=$(echo "$ICON_COLOR" | grep -E '^#[0-9A-Fa-f]{6}$' || echo '#6366f1')

          WEBSITE_HOST=$(echo "$SAFE_URL" | sed 's|https\?://||' | sed 's|/.*||' | sed 's|?.*||')

          escape_sed_replacement() {
            printf '%s' "$1" | sed 's/[\\&|]/\\&/g'
          }

          SAFE_APP_NAME_ESCAPED=$(escape_sed_replacement "$SAFE_APP_NAME")
          SAFE_PACKAGE_ESCAPED=$(escape_sed_replacement "$SAFE_PACKAGE")
          SAFE_URL_ESCAPED=$(escape_sed_replacement "$SAFE_URL")
          SAFE_COLOR_ESCAPED=$(escape_sed_replacement "$SAFE_COLOR")
          WEBSITE_HOST_ESCAPED=$(escape_sed_replacement "$WEBSITE_HOST")

          echo "Replacing placeholders..."
          echo "  APP_NAME     -> $SAFE_APP_NAME"
          echo "  PACKAGE_NAME -> $SAFE_PACKAGE"
          echo "  WEBSITE_URL  -> $SAFE_URL"
          echo "  ICON_COLOR   -> $SAFE_COLOR"
          echo "  WEBSITE_HOST -> $WEBSITE_HOST"

          # Replace in Kotlin without touching the BuildConfig URL constant.
          find . -type f -name "*.kt" | while read file; do
            sed -i \
              -e "s|APP_NAME|$SAFE_APP_NAME_ESCAPED|g" \
              -e "s|APP_PACKAGE|$SAFE_PACKAGE_ESCAPED|g" \
              -e "s|ICON_COLOR|$SAFE_COLOR_ESCAPED|g" \
              -e "s|WEBSITE_HOST|$WEBSITE_HOST_ESCAPED|g" \
              "$file"
          done

          # Replace the remaining placeholders in resource and properties files.
          find . -type f \( -name "*.xml" -o -name "*.properties" \) | while read file; do
            sed -i \
              -e "s|APP_NAME|$SAFE_APP_NAME_ESCAPED|g" \
              -e "s|APP_PACKAGE|$SAFE_PACKAGE_ESCAPED|g" \
              -e "s|ICON_COLOR|$SAFE_COLOR_ESCAPED|g" \
              -e "s|WEBSITE_HOST|$WEBSITE_HOST_ESCAPED|g" \
              "$file"
          done

          echo "Placeholder replacement complete."

      # ── 7. Generate launcher icons ──────────────────────────────────────
      - name: Generate launcher icons
        working-directory: android-template
        env:
          APP_ICON_URL: ${{ github.event.client_payload.icon_url }}
          WEBSITE_URL: ${{ github.event.client_payload.website_url }}
        run: |
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import io
          import os
          import sys
          from pathlib import Path
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          from PIL import Image, ImageDraw, ImageOps

          icon_url = os.environ.get('APP_ICON_URL', '').strip()
          website_url = os.environ.get('WEBSITE_URL', '').strip()

          if not icon_url and website_url:
            icon_url = f"https://www.google.com/s2/favicons?sz=512&domain_url={quote(website_url, safe='')}"

          if not icon_url:
            print('No icon URL available; keeping the template launcher assets.')
            sys.exit(0)

          def download_image(url):
            request = Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urlopen(request, timeout=30) as response:
              return response.read()

          try:
            raw_image = download_image(icon_url)
            source = Image.open(io.BytesIO(raw_image)).convert('RGBA')
          except Exception as exc:
            print(f'Icon download failed ({exc}); keeping the template launcher assets.')
            sys.exit(0)

          resampling = getattr(getattr(Image, 'Resampling', Image), 'LANCZOS')

          def render_icon(size, round_icon=False):
            canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            icon = ImageOps.contain(source, (int(size * 0.72), int(size * 0.72)), resampling)
            x = (size - icon.width) // 2
            y = (size - icon.height) // 2
            canvas.alpha_composite(icon, (x, y))

            if round_icon:
              mask = Image.new('L', (size, size), 0)
              draw = ImageDraw.Draw(mask)
              draw.ellipse((0, 0, size - 1, size - 1), fill=255)
              canvas.putalpha(mask)

            return canvas

          densities = {
            'mdpi': 48,
            'hdpi': 72,
            'xhdpi': 96,
            'xxhdpi': 144,
            'xxxhdpi': 192,
          }

          for density, size in densities.items():
            mipmap_dir = Path('app/src/main/res') / f'mipmap-{density}'
            mipmap_dir.mkdir(parents=True, exist_ok=True)
            render_icon(size).save(mipmap_dir / 'ic_launcher.png')
            render_icon(size, round_icon=True).save(mipmap_dir / 'ic_launcher_round.png')

          drawable_dir = Path('app/src/main/res/drawable')
          drawable_dir.mkdir(parents=True, exist_ok=True)
          render_icon(432).save(drawable_dir / 'ic_launcher_foreground.png')

          for path in [
            Path('app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml'),
            Path('app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml'),
            Path('app/src/main/res/drawable/ic_launcher_foreground.xml'),
          ]:
            if path.exists():
              path.unlink()

          print(f'Generated launcher icons from {icon_url}')
          PY

      # ── 8. Set up Android SDK ────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android-template
        run: chmod +x gradlew

      # ── 10. Decode keystore ──────────────────────────────────────────────
      - name: Decode release keystore
        working-directory: android-template/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          echo "Keystore decoded"

      # ── 11. Notify: Signing ─────────────────────────────────────────────
      - name: Notify signing started
        if: ${{ github.event.client_payload.callback_url != '' && github.event.client_payload.callback_url != null }}
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ github.event.client_payload.callback_secret }}" \
            -d '{
              "build_id": "${{ env.BUILD_ID }}",
              "status": "signing",
              "github_run_id": "${{ github.run_id }}"
            }' || true

      # ── 12. Build release APK ───────────────────────────────────────────
      - name: Build release APK
        working-directory: android-template
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -PappPackage="${{ env.PACKAGE_NAME }}" \
            -PappName="${{ env.APP_NAME }}" \
            -PwebsiteUrl="${{ env.WEBSITE_URL }}" \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android-template/app/keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 13. Verify APK exists ───────────────────────────────────────────
      - name: Verify APK output
        working-directory: android-template
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found after build!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "APK found: $APK_PATH"
          echo "APK size:  $APK_SIZE bytes"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV

      # ── 14. Rename APK ──────────────────────────────────────────────────
      - name: Rename APK with build info
        working-directory: android-template
        run: |
          APK_DIR=$(dirname "$APK_PATH")
          PACKAGE="${{ env.PACKAGE_NAME }}"
          BUILD_ID="${{ env.BUILD_ID }}"
          NEW_NAME="${PACKAGE}-${BUILD_ID}.apk"
          mv "$APK_PATH" "$APK_DIR/$NEW_NAME"
          echo "FINAL_APK=android-template/$APK_DIR/$NEW_NAME" >> $GITHUB_ENV
          echo "Renamed to: $APK_DIR/$NEW_NAME"

      # ── 15. Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_ID }}
          release_name: "${{ env.APP_NAME }} - Build ${{ env.BUILD_ID }}"
          body: |
            ## ${{ env.APP_NAME }}

            **Build ID:** `${{ env.BUILD_ID }}`
            **Package:** `${{ env.PACKAGE_NAME }}`
            **Website:** ${{ env.WEBSITE_URL }}
            **Run ID:** ${{ github.run_id }}

            ### Install Instructions
            1. Download the APK file below
            2. Enable "Unknown Sources" in Android Settings
            3. Install and launch the app
          draft: false
          prerelease: false

      # ── 16. Upload APK to Release ────────────────────────────────────────
      - name: Upload APK to Release
        id: upload_apk
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.FINAL_APK }}
          asset_name: "${{ env.PACKAGE_NAME }}.apk"
          asset_content_type: application/vnd.android.package-archive

      # ── 17. Notify: Complete ────────────────────────────────────────────
      - name: Notify build complete
        if: success() && github.event.client_payload.callback_url != '' && github.event.client_payload.callback_url != null
        run: |
          DOWNLOAD_URL="${{ steps.upload_apk.outputs.browser_download_url }}"
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ github.event.client_payload.callback_secret }}" \
            -d "{
              \"build_id\": \"${{ env.BUILD_ID }}\",
              \"status\": \"complete\",
              \"github_run_id\": \"${{ github.run_id }}\",
              \"download_url\": \"$DOWNLOAD_URL\",
              \"apk_size\": ${{ env.APK_SIZE }}
            }" || true

      # ── 18. Notify: Failed ──────────────────────────────────────────────
      - name: Notify build failed
        if: failure() && github.event.client_payload.callback_url != '' && github.event.client_payload.callback_url != null
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Callback-Secret: ${{ github.event.client_payload.callback_secret }}" \
            -d '{
              "build_id": "${{ env.BUILD_ID }}",
              "status": "failed",
              "github_run_id": "${{ github.run_id }}",
              "error_message": "GitHub Actions build failed. Check the workflow logs for details."
            }' || true

      # ── 19. Cleanup ─────────────────────────────────────────────────────
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android-template/app/keystore.jks || true
          echo "Cleanup complete"

      # ── 20. Upload artifact for debugging ───────────────────────────────
      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.BUILD_ID }}
          path: "**/*.apk"
          retention-days: 7
