name: Build Android APK

on:
  repository_dispatch:
    types:
      - build-apk
  workflow_dispatch:
    inputs:
      buildId:
        description: 'Build ID'
        required: true
        type: string
      appId:
        description: 'App ID'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Allow either a manual workflow_dispatch run (inputs are required so they're
    # guaranteed non-empty by GitHub), or a repository_dispatch payload that
    # actually carries buildId/appId.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'repository_dispatch' &&
       github.event.client_payload.buildId != '' &&
       github.event.client_payload.appId != '')

    steps:
      # ── 1. Checkout android template ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Resolve app/build data from Supabase ─────────────────────────
      - name: Resolve build data from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Use workflow_dispatch inputs when triggered manually, otherwise
          # fall back to the repository_dispatch client_payload.
          BUILD_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.buildId || github.event.client_payload.buildId }}
          APP_ID: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.appId || github.event.client_payload.appId }}
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import secrets as secrets_module
          from urllib.request import Request, urlopen

          def require(name):
            value = (os.environ.get(name) or '').strip()
            if not value:
              raise SystemExit(f'Missing required value: {name}')
            return value

          supabase_url = require('SUPABASE_URL').rstrip('/')
          service_key = require('SUPABASE_SERVICE_ROLE_KEY')
          build_id = require('BUILD_ID')
          app_id = require('APP_ID')

          if not supabase_url.startswith(('http://', 'https://')):
            raise SystemExit('SUPABASE_URL must start with http:// or https://')

          headers = {
            'apikey': service_key,
            'Authorization': f'Bearer {service_key}',
            'Content-Type': 'application/json',
          }

          def fetch_json(path):
            request = Request(f'{supabase_url}{path}', headers=headers)
            with urlopen(request, timeout=30) as response:
              return json.loads(response.read().decode('utf-8'))

          build = fetch_json(f'/rest/v1/builds?id=eq.{build_id}&select=*')
          app = fetch_json(f'/rest/v1/apps?id=eq.{app_id}&select=*')

          if not build or not app:
            raise SystemExit('Missing build or app row in Supabase')

          build = build[0]
          app = app[0]

          # Values pulled from the database are untrusted input. Writing them
          # as plain KEY=VALUE lines into $GITHUB_ENV would let an embedded
          # newline inject or overwrite arbitrary env vars for the rest of
          # the job. Use the heredoc form with a random delimiter instead,
          # which safely handles newlines, "=" signs, etc.
          delimiter = secrets_module.token_hex(16)

          def write_env(name, value):
            print(f'{name}<<{delimiter}')
            print(value)
            print(delimiter)

          write_env('BUILD_ID', build_id)
          write_env('APP_ID', app_id)
          write_env('APP_NAME', app['app_name'])
          write_env('PACKAGE_NAME', app['package_name'])
          write_env('WEBSITE_URL', app['website_url'])
          write_env('ICON_COLOR', app.get('icon_color', '#6366f1'))
          write_env('ICON_SOURCE', app.get('icon_source', 'favicon'))
          write_env('ICON_URL', app.get('icon_url', ''))
          write_env('CALLBACK_URL', f'{supabase_url}/functions/v1/update-build')
          PY

      # ── 5. Replace placeholders ─────────────────────────────────────────
      - name: Configure app placeholders
        working-directory: android-template
        env:
          APP_NAME: ${{ env.APP_NAME }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          WEBSITE_URL: ${{ env.WEBSITE_URL }}
          ICON_COLOR: ${{ env.ICON_COLOR }}
        run: |
          # Sanitize inputs
          SAFE_APP_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9 _-]//g')
          SAFE_PACKAGE=$(echo "$PACKAGE_NAME" | sed 's/[^a-z0-9._]//g')
          SAFE_URL=$(echo "$WEBSITE_URL" | sed 's|[^a-zA-Z0-9.:/_?=&-]||g')
          SAFE_COLOR=$(echo "$ICON_COLOR" | grep -E '^#[0-9A-Fa-f]{6}$' || echo '#6366f1')

          WEBSITE_HOST=$(echo "$SAFE_URL" | sed 's|https\?://||' | sed 's|/.*||' | sed 's|?.*||')

          escape_sed_replacement() {
            printf '%s' "$1" | sed 's/[\\&|]/\\&/g'
          }

          SAFE_APP_NAME_ESCAPED=$(escape_sed_replacement "$SAFE_APP_NAME")
          SAFE_PACKAGE_ESCAPED=$(escape_sed_replacement "$SAFE_PACKAGE")
          SAFE_URL_ESCAPED=$(escape_sed_replacement "$SAFE_URL")
          SAFE_COLOR_ESCAPED=$(escape_sed_replacement "$SAFE_COLOR")
          WEBSITE_HOST_ESCAPED=$(escape_sed_replacement "$WEBSITE_HOST")

          echo "Replacing placeholders..."
          echo "  APP_NAME     -> $SAFE_APP_NAME"
          echo "  PACKAGE_NAME -> $SAFE_PACKAGE"
          echo "  WEBSITE_URL  -> $SAFE_URL"
          echo "  ICON_COLOR   -> $SAFE_COLOR"
          echo "  WEBSITE_HOST -> $WEBSITE_HOST"

          # Replace in Kotlin without touching the BuildConfig URL constant.
          find . -type f -name "*.kt" | while read file; do
            sed -i \
              -e "s|APP_NAME|$SAFE_APP_NAME_ESCAPED|g" \
              -e "s|APP_PACKAGE|$SAFE_PACKAGE_ESCAPED|g" \
              -e "s|ICON_COLOR|$SAFE_COLOR_ESCAPED|g" \
              -e "s|WEBSITE_HOST|$WEBSITE_HOST_ESCAPED|g" \
              "$file"
          done

          # Replace the remaining placeholders in resource and properties files.
          find . -type f \( -name "*.xml" -o -name "*.properties" \) | while read file; do
            sed -i \
              -e "s|APP_NAME|$SAFE_APP_NAME_ESCAPED|g" \
              -e "s|APP_PACKAGE|$SAFE_PACKAGE_ESCAPED|g" \
              -e "s|ICON_COLOR|$SAFE_COLOR_ESCAPED|g" \
              -e "s|WEBSITE_HOST|$WEBSITE_HOST_ESCAPED|g" \
              "$file"
          done

          echo "Placeholder replacement complete."

      # ── 6. Generate launcher icons ──────────────────────────────────────
      - name: Generate launcher icons
        working-directory: android-template
        env:
          APP_ICON_URL: ${{ env.ICON_URL }}
          WEBSITE_URL: ${{ env.WEBSITE_URL }}
        run: |
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          import io
          import os
          import sys
          from pathlib import Path
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          from PIL import Image, ImageDraw, ImageOps

          icon_url = os.environ.get('APP_ICON_URL', '').strip()
          website_url = os.environ.get('WEBSITE_URL', '').strip()

          if not icon_url and website_url:
            icon_url = f"https://www.google.com/s2/favicons?sz=512&domain_url={quote(website_url, safe='')}"

          if not icon_url:
            print('No icon URL available; keeping the template launcher assets.')
            sys.exit(0)

          def download_image(url):
            request = Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urlopen(request, timeout=30) as response:
              return response.read()

          try:
            raw_image = download_image(icon_url)
            source = Image.open(io.BytesIO(raw_image)).convert('RGBA')
          except Exception as exc:
            print(f'Icon download failed ({exc}); keeping the template launcher assets.')
            sys.exit(0)

          resampling = getattr(getattr(Image, 'Resampling', Image), 'LANCZOS')

          def render_icon(size, round_icon=False):
            canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            icon = ImageOps.contain(source, (int(size * 0.72), int(size * 0.72)), resampling)
            x = (size - icon.width) // 2
            y = (size - icon.height) // 2
            canvas.alpha_composite(icon, (x, y))

            if round_icon:
              mask = Image.new('L', (size, size), 0)
              draw = ImageDraw.Draw(mask)
              draw.ellipse((0, 0, size - 1, size - 1), fill=255)
              canvas.putalpha(mask)

            return canvas

          densities = {
            'mdpi': 48,
            'hdpi': 72,
            'xhdpi': 96,
            'xxhdpi': 144,
            'xxxhdpi': 192,
          }

          for density, size in densities.items():
            mipmap_dir = Path('app/src/main/res') / f'mipmap-{density}'
            mipmap_dir.mkdir(parents=True, exist_ok=True)
            render_icon(size).save(mipmap_dir / 'ic_launcher.png')
            render_icon(size, round_icon=True).save(mipmap_dir / 'ic_launcher_round.png')

          drawable_dir = Path('app/src/main/res/drawable')
          drawable_dir.mkdir(parents=True, exist_ok=True)
          render_icon(432).save(drawable_dir / 'ic_launcher_foreground.png')

          for path in [
            Path('app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml'),
            Path('app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml'),
            Path('app/src/main/res/drawable/ic_launcher_foreground.xml'),
          ]:
            if path.exists():
              path.unlink()

          print(f'Generated launcher icons from {icon_url}')
          PY

      # ── 7. Set up Android SDK ────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 8. Make gradlew executable ───────────────────────────────────────
      - name: Make gradlew executable
        working-directory: android-template
        run: chmod +x gradlew

      # ── 9. Decode keystore ──────────────────────────────────────────────
      - name: Decode release keystore
        working-directory: android-template/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          if [ ! -s keystore.jks ]; then
            echo "ERROR: Decoded keystore is empty; check the KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "Keystore decoded"

      # ── 10. Build release APK ───────────────────────────────────────────
      - name: Build release APK
        working-directory: android-template
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -PappPackage="${{ env.PACKAGE_NAME }}" \
            -PappName="${{ env.APP_NAME }}" \
            -PwebsiteUrl="${{ env.WEBSITE_URL }}" \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android-template/app/keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 11. Verify APK exists ───────────────────────────────────────────
      # NOTE: we resolve APK_PATH to an ABSOLUTE path here so it can be
      # safely consumed by later steps regardless of their working-directory.
      - name: Verify APK output
        working-directory: android-template
        run: |
          APK_PATH=$(find "$(pwd)" -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found after build!"
            exit 1
          fi
          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "APK found: $APK_PATH"
          echo "APK size:  $APK_SIZE bytes"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK_SIZE=$APK_SIZE" >> "$GITHUB_ENV"

      # ── 12. Rename APK ──────────────────────────────────────────────────
      # No working-directory needed: APK_PATH is already absolute.
      - name: Rename APK with build info
        run: |
          APK_DIR=$(dirname "$APK_PATH")
          PACKAGE="${{ env.PACKAGE_NAME }}"
          BUILD_ID_VALUE="${{ env.BUILD_ID }}"
          NEW_NAME="${PACKAGE}-${BUILD_ID_VALUE}.apk"
          NEW_PATH="$APK_DIR/$NEW_NAME"
          mv "$APK_PATH" "$NEW_PATH"
          echo "FINAL_APK=$NEW_PATH" >> "$GITHUB_ENV"
          echo "Renamed to: $NEW_PATH"

      # ── 13. Create GitHub Release and upload APK ─────────────────────────
      # actions/create-release@v1 and actions/upload-release-asset@v1 are
      # both archived/unmaintained by GitHub. softprops/action-gh-release
      # is actively maintained and handles release creation + asset upload
      # in a single, more reliable step.
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_ID }}
          name: "${{ env.APP_NAME }} - Build ${{ env.BUILD_ID }}"
          body: |
            ## ${{ env.APP_NAME }}

            **Build ID:** `${{ env.BUILD_ID }}`
            **Package:** `${{ env.PACKAGE_NAME }}`
            **Website:** ${{ env.WEBSITE_URL }}
            **Run ID:** ${{ github.run_id }}

            ### Install Instructions
            1. Download the APK file below
            2. Enable "Unknown Sources" in Android Settings
            3. Install and launch the app
          draft: false
          prerelease: false
          files: ${{ env.FINAL_APK }}

      # ── 14. Cleanup ─────────────────────────────────────────────────────
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android-template/app/keystore.jks || true
          echo "Cleanup complete"

      # ── 15. Upload artifact for debugging ───────────────────────────────
      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.BUILD_ID }}
          path: "**/*.apk"
          retention-days: 7